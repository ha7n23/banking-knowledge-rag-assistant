name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Run Python tests and offline RAG evaluation
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          PYTHONPATH=src pytest

      - name: Run offline RAG evaluation quality gate
        run: |
          PYTHONPATH=src python -m banking_rag.runners.run_answer_eval \
            --mock-answers \
            --min-pass-rate 1.0 \
            --skip-timestamped-report
 
      - name: Upload offline evaluation reports
        uses: actions/upload-artifact@v4
        with:
          name: offline-rag-evaluation-reports
          path: |
            evaluation/reports/answer_eval_latest.json
            evaluation/reports/answer_eval_latest.md
          if-no-files-found: error
          retention-days: 7
      

  docker-build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image with cache
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: banking-knowledge-rag-assistant:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max